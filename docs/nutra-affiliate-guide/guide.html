# Chương 1: Tổng quan ngành Nutra Affiliate

## 1.1 Nutra là gì?

**Nutra** (viết tắt của Nutraceutical) = các sản phẩm chăm sóc sức khỏe, làm đẹp, thực phẩm chức năng được bán qua mô hình marketing trực tiếp (direct response marketing).

**Các category chính:**
- **Weight Loss** — giảm cân (category lớn nhất)
- **Male Enhancement** — sức khỏe nam giới
- **Skin Care / Anti-aging** — chăm sóc da, chống lão hóa
- **Joint Pain / Health** — đau khớp, sức khỏe tổng quát
- **Hair Loss** — rụng tóc
- **Diabetes / Blood Pressure** — tiểu đường, huyết áp
- **Vision / Hearing** — thị lực, thính giác
- **Parasites** — ký sinh trùng (hot ở CIS)

## 1.2 Tại sao Nutra là vertical lớn nhất trong Affiliate?

1. **Demand vĩnh cửu**: con người luôn muốn khỏe hơn, đẹp hơn, trẻ hơn
2. **Margin cực cao**: sản phẩm sản xuất giá $2-5, bán $30-80
3. **Repeat purchase**: khách hàng dùng hết lại mua → LTV cao
4. **Scalable**: cùng 1 sản phẩm có thể đổi tên, đổi landing page, chạy nhiều GEO
5. **COD model giảm barrier**: khách không cần thẻ tín dụng, trả tiền khi nhận hàng

## 1.3 Sự khác biệt giữa Nutra và các vertical khác

| Đặc điểm | Nutra | E-commerce | Finance | Gambling |
|-----------|-------|------------|---------|----------|
| Mô hình chính | COD / Trial | Prepaid | CPL/CPA | RevShare/CPA |
| Vòng đời offer | 3-12 tháng | Vĩnh viễn | Dài | Dài |
| Approval cần thiết | Có (30-60%) | Không | Không | Không |
| Call center | Bắt buộc | Không | Không | Không |
| Regulation risk | Cao | Thấp | Rất cao | Rất cao |
| Entry barrier | Trung bình | Thấp | Cao | Cao |

## 1.4 Chuỗi giá trị tổng quát

```
Nhà sản xuất (Manufacturer)
    ↓ sản xuất sản phẩm
Advertiser / Brand Owner
    ↓ tạo offer, set payout
Affiliate Network (AffScale)
    ↓ phân phối offer, tracking
Publisher / Affiliate / Media Buyer
    ↓ chạy ads, đẩy traffic
Landing Page / Pre-lander
    ↓ thuyết phục khách
Lead Form (khách điền thông tin)
    ↓ lead được gửi về
Call Center
    ↓ gọi xác nhận đơn hàng
Warehouse / Fulfillment
    ↓ đóng gói, vận chuyển
Delivery (COD)
    ↓ giao hàng, thu tiền
Khách hàng nhận hàng & thanh toán
```

**Điểm quan trọng**: Là MKT Ops Manager trên AffScale, bạn đứng ở vị trí **Affiliate Network** — bạn quản lý việc kết nối giữa advertiser (nguồn offer) và publisher (nguồn traffic), đồng thời tối ưu hiệu suất toàn bộ chuỗi.

## 1.5 Thuật ngữ cơ bản (PHẢI thuộc)

### Traffic & Conversion
| Thuật ngữ | Giải thích |
|-----------|------------|
| **Traffic** | Lượng người dùng được đưa đến landing page |
| **Click** | Mỗi lần user click vào quảng cáo |
| **Unique Click** | Số người dùng riêng biệt (không đếm trùng) |
| **Lead** | User điền form để lại thông tin (tên, SĐT) |
| **Conversion (Conv)** | Lead được call center confirm thành công → đơn hàng |
| **CR (Conversion Rate)** | % click → lead, hoặc % lead → confirmed order |
| **Approve / Approval** | Đơn hàng được giao thành công, khách nhận & trả tiền |
| **Approval Rate (AR)** | % lead → approved (đã giao thành công) |
| **Trash** | Lead rác — sai SĐT, spam, duplicate |
| **Trash Rate** | % lead bị đánh là rác |
| **Hold** | Lead đang chờ xử lý (chưa gọi, hoặc callback) |
| **Reject** | Lead bị từ chối khi call center gọi |

### Tài chính
| Thuật ngữ | Giải thích |
|-----------|------------|
| **Payout** | Số tiền network trả cho affiliate cho mỗi lead/conversion |
| **Revenue** | Số tiền advertiser trả cho network |
| **Margin** | Revenue - Payout = lợi nhuận của network |
| **CPA (Cost Per Action)** | Chi phí cho mỗi hành động (lead, sale) |
| **CPL (Cost Per Lead)** | Chi phí cho mỗi lead |
| **EPC (Earnings Per Click)** | Thu nhập trung bình mỗi click |
| **EPL (Earnings Per Lead)** | Thu nhập trung bình mỗi lead |
| **ROI** | (Revenue - Cost) / Cost × 100% |
| **Cap** | Giới hạn số lead/ngày cho 1 offer |
| **Shave** | Cắt bớt lead không tính tiền (gray area) |

### Kỹ thuật
| Thuật ngữ | Giải thích |
|-----------|------------|
| **Postback** | Signal gửi từ hệ thống này sang hệ thống khác khi có event |
| **S2S (Server-to-Server)** | Tracking không dùng cookie, server gọi trực tiếp |
| **Pixel** | Code tracking đặt trên trang để ghi nhận conversion |
| **Sub ID** | Các tham số phụ dùng để segment traffic (sub1, sub2...) |
| **Landing Page (LP)** | Trang bán hàng chính |
| **Pre-lander** | Trang "làm nóng" trước landing page (thường dạng article) |
| **Flow** | Toàn bộ hành trình từ ad → pre-lander → LP → form |
| **Redirect** | Chuyển hướng traffic từ URL này sang URL khác |
| **Smartlink** | Link tự động chọn offer phù hợp nhất cho mỗi user |
| **OOS (Out of Stock)** | Hết hàng — nguyên nhân lớn gây mất lead |

## 1.6 Tại sao role MKT Ops Manager quan trọng?

Trong một công ty affiliate nutra, có rất nhiều bộ phận hoạt động đồng thời:
- Media buyers đang chạy ads
- Call center đang gọi confirm
- Warehouse đang ship hàng
- Finance đang reconcile payment
- Product team đang test offer mới

**Không ai nhìn toàn bộ bức tranh** → đó là việc của bạn.

Bạn là người:
- Nhìn dashboard và biết **ngay** đâu đang có vấn đề
- Phát hiện offer nào cần pause, GEO nào cần scale
- Đảm bảo tiền chi ra đang sinh lời
- Kéo các team vào họp khi cần escalation
- Báo cáo cho CMO/Board bức tranh toàn cảnh + khuyến nghị

## 1.7 Mindset cần có

1. **Mọi thứ là số**: không có "tôi nghĩ", chỉ có "data cho thấy"
2. **Speed matters**: 1 ngày delay = mất tiền thật. Offer kém phải pause ngay, offer tốt phải scale ngay
3. **Trust but verify**: Affiliate có thể gửi lead rác, advertiser có thể shave lead — luôn cross-check
4. **GEO ≠ GEO**: Cùng 1 offer, chạy ở Nga khác hoàn toàn ở Brazil
5. **Seasonality**: Có mùa cao mùa thấp — Q4 (trước Tết/holiday) thường peak

**Đặc điểm COD:**
- Khách KHÔNG cần thẻ tín dụng → conversion rate cao hơn
- Nhưng nhiều người "đặt cho vui" → approval rate thấp (30-60%)

        │     ├── RETURNED (khách không nhận, trả lại)
        │     └── LOST (thất lạc)
        └── CANCELLED (hủy trước khi ship)
```

```

    ↓

**Đặc điểm SS:**
- Conversion rate thấp hơn COD (cần thẻ)

- Ít phổ biến ở thị trường đang phát triển (CIS, SEA, Latam)
- Chủ yếu ở US, EU, UK, AU

    ↓

```

### Ví dụ thực tế — 1 ngày hoạt động

```
Giả sử 1 offer Weight Loss ở Nga:

    ↓
Được 200 clicks → 20 leads (CR = 10%)
    ↓ CPL = $500/20 = $25/lead

## 2.3 Cấu trúc giá & Margin

### Payout models

**1. CPA (Cost Per Action) — Phổ biến nhất**
- Trả cố định cho mỗi approved lead
- Ví dụ: $10/approved lead
- Affiliate thích vì biết trước được bao nhiêu

**2. CPL (Cost Per Lead)**
- Trả cho mỗi lead (chưa cần approved)
- Ví dụ: $3/lead
- Risk cho network cao hơn (lead có thể trash)

**3. CPS (Cost Per Sale)**
- Trả % doanh thu bán hàng
- Ví dụ: 30% giá bán

**4. RevShare**
- Chia sẻ doanh thu dài hạn
- Ít phổ biến trong nutra COD

### Cách tính margin cho Network

```
Margin = Revenue (từ Advertiser) - Payout (cho Affiliate) - Chi phí vận hành

Margin target thường: 20-40% trên mỗi offer

Ví dụ:
- Advertiser trả Network: $12/approved lead
- Network trả Affiliate: $8/approved lead
- Margin: $4/lead = 33%

NHƯNG phải tính thêm:
- Chi phí platform (AffScale hosting, licenses)
- Lương team (call center, media buyers nội bộ nếu có)
- Chi phí tracking, servers
- Bad debt (advertiser không trả)
```

## 2.4 Các model thanh toán & rủi ro

### Thanh toán từ Advertiser

| Model | Mô tả | Rủi ro |
|-------|--------|--------|
| Net-7 | Trả sau 7 ngày | Thấp |
| Net-15 | Trả sau 15 ngày | Trung bình |
| Net-30 | Trả sau 30 ngày | Cao |
| Weekly | Trả hàng tuần | Thấp |
| Bi-weekly | 2 tuần/lần | Trung bình |

### Thanh toán cho Affiliate

| Model | Khi nào dùng |
|-------|-------------|
| Net-7 | Affiliate đáng tin cậy, volume cao |
| Net-15 | Mặc định |
| Net-30 | Affiliate mới, chưa verify |
| Weekly | Top affiliates, giữ chân |
| Daily | Rất hiếm, chỉ cho VIP |

### Rủi ro tài chính cần theo dõi

1. **Advertiser không trả tiền**: Đã trả affiliate rồi nhưng advertiser chạy mất → LỖ
2. **Lead fraud**: Affiliate gửi lead fake → network trả tiền cho lead rác
3. **Shaving**: Advertiser cắt bớt lead approved → revenue thấp hơn thực tế
4. **Currency risk**: Thanh toán USD nhưng chi phí RUB/BRL → biến động tỷ giá
5. **Chargeback**: (Cho SS model) khách đòi lại tiền qua ngân hàng

## 2.5 Unit Economics — Con số bạn PHẢI biết

### Cho mỗi Offer/GEO combo, bạn cần biết:

```
Ví dụ: Offer "SlimFit" tại Russia

1. Average Payout to Affiliate:     $8.00 / approved lead
2. Average Revenue from Advertiser:  $12.00 / approved lead
3. Gross Margin per lead:            $4.00 (33%)
4. Average Approval Rate:            42%
5. Average Leads/day:                150
6. Approved leads/day:               63 (150 × 42%)
7. Daily Revenue:                    $756 (63 × $12)
8. Daily Payout:                     $504 (63 × $8)
9. Daily Gross Profit:               $252
10. Monthly Gross Profit:            ~$7,560

Câu hỏi bạn phải tự trả lời:
- $7,560/tháng có đủ cover chi phí vận hành cho offer này?
- Approval rate 42% có thể cải thiện không?
- Nếu tăng cap lên 300 leads/day, call center có handle nổi không?
- Offer này đang ở giai đoạn nào? (growing / stable / declining)
```

## 2.6 Vòng đời của một Offer

```
TEST → SCALE → STABLE → DECLINE → PAUSE/KILL

TEST (1-2 tuần):
- Chạy volume thấp (20-50 leads/day)
- Đánh giá CR, approval rate, trash rate
- Quyết định: scale hay kill

SCALE (2-8 tuần):
- Tăng cap dần (100 → 300 → 500+ leads/day)
- Thêm nhiều affiliates
- Monitor chặt approval rate (thường giảm khi scale)

STABLE (1-6 tháng):
- Volume ổn định
- Focus optimize margin
- Maintain approval rate

DECLINE:
- CR giảm (audience fatigue)
- Approval rate giảm
- Advertiser giảm payout
- Cạnh tranh tăng

PAUSE/KILL:
- ROI < threshold
- Advertiser dừng offer
- Regulation issues
```

- Facebook/Google CẤM quảng cáo nutra trực tiếp
- Affiliates dùng **cloaking** (hiện trang khác cho reviewer, trang thật cho user)
- Nếu bị phát hiện → ban account → affiliate mất khả năng chạy
- Đây là rủi ro lớn cho network: top affiliate bị ban → volume drop ngay

---

### E. Call Center

**Vai trò:** Gọi điện xác nhận đơn hàng từ lead

**Tại sao Call Center QUYẾT ĐỊNH lợi nhuận:**

```
Ví dụ: 100 leads vào

Call Center TỐT:                    Call Center KÉM:
- Gọi trong 15 phút                 - Gọi sau 2 giờ
- Confirm 55 đơn                    - Confirm 30 đơn
- Upsell thêm 20 đơn               - Không upsell
- Approval rate: 55%                - Approval rate: 30%

Revenue chênh lệch: gần GẤP ĐÔI
```

**Metrics Call Center cần theo dõi:**
- **Response time**: Thời gian từ lead vào → gọi lần đầu (< 15 phút là tốt)
- **Contact rate**: % lead liên lạc được
- **Confirm rate**: % lead xác nhận mua
- **Upsell rate**: % khách mua thêm sản phẩm
- **Callback rate**: % cần gọi lại
- **Talk time**: Thời gian trung bình mỗi cuộc gọi

**Call Center thường:**
- In-house (của advertiser) — kiểm soát tốt hơn
- Outsourced — rẻ hơn nhưng khó kiểm soát
- Đặt tại nước có nguồn nhân lực rẻ + nói được ngôn ngữ target (VD: call center tiếng Nga đặt ở Kazakhstan)

---

### F. Warehouse & Fulfillment

**Vai trò:** Lưu kho, đóng gói, giao hàng

**Ảnh hưởng đến performance:**
- **OOS (Out of Stock)** → không ship được → lead expire → MẤT TIỀN
- **Delivery time** → giao lâu → khách quên/đổi ý → approval giảm
- **Delivery rate** → % giao thành công (ảnh hưởng bởi địa chỉ sai, khách không có nhà)

**Metrics cần theo dõi:**
- Stock level per SKU per warehouse
- Average delivery time per GEO
- Delivery success rate
- Return rate

## 3.3 Mối quan hệ và Power Dynamics

```
ADVERTISER có quyền lực khi:
├── Sở hữu offer exclusive hot
├── Approval rate tốt
└── Payout cạnh tranh
→ Network phải chiều, sợ mất offer

NETWORK có quyền lực khi:
├── Có nhiều top affiliates
├── Volume lớn (leverage đàm phán payout)
└── Cung cấp giá trị gia tăng (analytics, optimization)
→ Cả 2 bên cần network

AFFILIATE có quyền lực khi:
├── Volume lớn, quality tốt
├── Có nhiều lựa chọn network
└── Expertise traffic source khó (FB, Google)
→ Network phải giữ bằng payout cao, support tốt
```

**Bạn cần hiểu dynamic này để:**
- Biết khi nào có thể đàm phán tăng payout từ advertiser
- Biết khi nào cần giữ affiliate bằng payout bump
- Biết khi nào offer đang mất competitive advantage

# Chương 5: Offer Management & Optimization

## 5.1 Anatomy of an Offer

Mỗi offer trên AffScale (hoặc bất kỳ affiliate platform nào) gồm các thành phần:

```
OFFER: SlimFit Pro — Russia
├── Offer ID:           #1234
├── Advertiser:         NutraHealth LLC
├── Category:           Weight Loss
├── GEO:                Russia (RU)
├── Payout Model:       CPA (Cost per Approved Lead)
├── Payout to Affiliate: $10.00
├── Revenue from Adv:   $14.00
├── Margin:             $4.00 (28.6%)
├── Cap:                200 leads/day
├── Flow:               COD
├── Landing Pages:      3 active LPs
├── Target Audience:    Women 30-60
├── Restrictions:       No incentivized traffic, no adult
├── Status:             Active
├── Hold Period:        30 days
├── Conversion Type:    Approved (paid & delivered)
└── Notes:              Top performer Q1, trending up
```

## 5.2 Các loại Offer trong Nutra

### Theo flow thanh toán:
| Flow | Mô tả | AR typical | Dùng ở |
|------|--------|-----------|--------|
| **COD** | Trả khi nhận hàng | 30-55% | CIS, Asia, Latam |
| **SS (Straight Sale)** | Trả online | ~95% | US, EU |
| **Trial** | Dùng thử, tự động charge | Varies | US, EU |
| **CC Submit** | Chỉ cần submit thẻ | ~85% | US, EU |

### Theo conversion event:
| Type | Trả tiền khi | Risk cho network |
|------|-------------|-----------------|
| **CPL (Per Lead)** | Lead điền form | Cao (chưa biết quality) |
| **CPA Confirmed** | Call center confirm | Trung bình |
| **CPA Approved** | Giao hàng thành công | Thấp |
| **RevShare** | Chia % doanh thu | Thấp, long-term |

## 5.3 Cách đánh giá 1 Offer (Offer Scorecard)

Khi nhìn vào bất kỳ offer nào, đánh giá theo 8 tiêu chí:

```
OFFER SCORECARD
═══════════════════════════════════════════
Offer: ____________    GEO: ____________

1. VOLUME                           Score: __/10
   Leads/day hiện tại: ___
   Potential: ___
   Trend: ↑ ↓ →

2. APPROVAL RATE                    Score: __/10
   Current AR: ___%
   Benchmark GEO: ___%
   Trend: ↑ ↓ →

3. MARGIN                           Score: __/10
   Revenue/lead: $___
   Payout/lead: $___
   Margin: $____ (__%)

4. STABILITY                        Score: __/10
   How long active: ___ months
   Volume fluctuation: High / Medium / Low
   Advertiser reliability: ___

5. QUALITY (Trash Rate)             Score: __/10
   Current trash: ___%
   Target: < 15%

6. SCALABILITY                      Score: __/10
   Cap headroom: ___
   # affiliates running: ___
   Traffic source diversity: ___

7. COMPETITION                      Score: __/10
   Other networks running same offer: Yes/No
   Payout competitive: Yes/No

8. STRATEGIC VALUE                  Score: __/10
   New GEO entry: Yes/No
   Diversification value: Yes/No
   Advertiser relationship: ___

TOTAL:  __/80
ACTION: Scale / Maintain / Optimize / Test / Pause / Kill
═══════════════════════════════════════════
```

## 5.4 Offer Lifecycle Management

### Phase 1: Sourcing & Evaluation

**Offer mới đến từ đâu?**
- Advertiser pitch trực tiếp
- AR team tìm từ advertiser mới
- Copy từ competitor network (xem họ đang chạy gì hot)
- Affiliate request (affiliate muốn chạy offer cụ thể)

**Checklist trước khi launch:**
```
□ Advertiser đã verify (legit, track record)
□ Payout & revenue terms rõ ràng
□ Landing pages ready & tested
□ Tracking/postback setup & tested
□ Call center capacity confirmed
□ Stock availability confirmed
□ GEO restrictions clear
□ Traffic restrictions clear
□ Test budget approved
□ Assigned affiliates identified
```

### Phase 2: Testing

**Test protocol:**
```
Duration:     7-14 ngày
Volume:       20-50 leads/day
Affiliates:   1-3 trusted affiliates
Budget:       Limited (xác định max loss chấp nhận)

Metrics to monitor DAILY:
├── CR (click → lead)
├── Lead volume
├── Trash rate
├── Confirm rate (call center)
├── Approval rate (nếu delivery cycle đủ ngắn)
└── Any red flags

GO criteria (cần ĐẠT TẤT CẢ):
├── AR > benchmark GEO (VD: > 35% cho RU)
├── Trash rate < 20%
├── CR stable hoặc improving
├── Advertiser feedback positive
└── No compliance issues

NO-GO criteria (1 trong các điều kiện):
├── AR < 25% sau 100 leads
├── Trash > 30%
├── Advertiser complaints
├── No affiliate interest
└── Compliance issues
```

### Phase 3: Scale

**Scaling checklist:**
```
□ Increase cap gradually (50 → 100 → 200 → 500)
□ Add more affiliates
□ Monitor AR as volume increases (AR thường GIẢM khi scale)
□ Ensure call center can handle volume
□ Ensure stock is sufficient
□ Watch for quality drop by sub-sources
□ Set up alerts for anomalies
```

**Scaling pitfalls:**
1. **AR drop**: Khi scale, affiliates mới chất lượng thấp hơn → AR giảm
2. **OOS**: Tăng volume nhưng warehouse không theo kịp
3. **Call center bottleneck**: Quá nhiều lead, call center gọi không kịp
4. **Budget overrun**: Payout tăng nhanh hơn revenue
5. **Quality dilution**: Top affiliate AR 50%, mới thêm affiliate AR 25% → trung bình giảm

### Phase 4: Optimization

**Optimize theo dimension nào?**

```
1. BY AFFILIATE
   ├── Identify top performers → offer higher payout, exclusive terms
   ├── Identify under-performers → warning → optimize → cut
   └── Compare AR by affiliate → same offer, different AR = traffic quality issue

2. BY TRAFFIC SOURCE
   ├── Facebook leads vs Native leads vs Push leads
   ├── Mỗi source có quality khác nhau
   └── Adjust payout by source nếu cần

3. BY LANDING PAGE
   ├── A/B test landing pages
   ├── CR differences → choose winner
   └── Rotate to prevent fatigue

4. BY SUB-GEO
   ├── Russia: Moscow vs regions
   ├── Brazil: São Paulo vs North
   └── Delivery time & AR varies by region

5. BY TIME
   ├── Day of week patterns
   ├── Time of day patterns
   └── Seasonal trends
```

### Phase 5: Decline & Decision

**Signals offer đang decline:**
```
WARNING SIGNS (Cần monitor chặt):
├── AR giảm 5%+ trong 2 tuần liên tiếp
├── CR giảm (landing page fatigue)
├── Top affiliate volume giảm
├── Advertiser giảm cap
└── CPL tăng (competition)

RED FLAGS (Cần action ngay):
├── AR < 25%
├── Advertiser delay payment
├── Stock out > 3 ngày
├── Trash rate > 30%
└── Advertiser thay đổi terms bất lợi
```

**Decision framework:**
```
IF AR declining:
    → Check: call center issue? → escalate to advertiser
    → Check: traffic quality? → audit affiliates
    → Check: delivery issue? → check logistics
    → Check: product fatigue? → test new LPs

IF still declining after optimization:
    → Option 1: Reduce cap, keep only top affiliates
    → Option 2: Negotiate higher revenue from advertiser
    → Option 3: Pause and replace with better offer
```

## 5.5 Offer Portfolio Management

### Đa dạng hóa portfolio

**Không bao giờ phụ thuộc vào 1 offer hoặc 1 GEO.**

Cấu trúc portfolio lý tưởng:
```
BY GEO:
├── CIS:   40-50% revenue
├── Asia:  25-35% revenue
└── Latam: 20-30% revenue

BY CATEGORY:
├── Weight Loss:      30-40%
├── Male Enhancement: 15-25%
├── Joint/Health:     15-20%
├── Skin/Beauty:      10-15%
└── Others:           10-15%

BY LIFECYCLE:
├── Mature/Stable:    60-70% (cash cows)
├── Growing/Scaling:  20-25% (stars)
└── Testing:          10-15% (pipeline)
```

### Offer Rotation Strategy

```
Tại sao cần rotate?

Offer → Affiliates chạy → Audience thấy → MUA
                                         → KHÔNG MUA (nhiều lần)
                                         → AD FATIGUE → CR giảm

Giải pháp:
1. Rotate landing pages (mỗi 2-4 tuần)
2. Rename product (cùng sản phẩm, tên khác, LP mới)
3. Test categories mới liên tục
4. Mở GEO mới cho offer proven
```

## 5.6 Cap Management

### Cap là gì?
- Giới hạn số lead/ngày mà 1 offer chấp nhận
- Set bởi advertiser (dựa trên call center capacity + stock)

### Tại sao cap management quan trọng?

```
Scenario 1: Cap quá thấp
├── Affiliates không đủ chỗ chạy → chuyển network khác
├── Revenue bị giới hạn
└── Miss opportunity

Scenario 2: Cap quá cao
├── Call center không gọi kịp → leads expire → AR giảm
├── Stock hết → OOS
└── Quality giảm (accept lead bừa)

Scenario 3: Cap allocation không công bằng
├── Top affiliate không được đủ cap → bỏ đi
├── Low-quality affiliate chiếm cap → waste
└── Drama nội bộ
```

### Cap Allocation Strategy

```
PRIORITY ORDER:
1. Internal media buying team (nếu có)    → ưu tiên cao nhất
2. Tier 1 affiliates (proven quality)     → cap guarantee
3. Tier 2 affiliates                      → shared remaining cap
4. Tier 3 / new affiliates               → limited test cap

RULES:
- Top affiliate (AR > 50%) → guaranteed X leads/day
- Average affiliate (AR 35-50%) → cap based on performance
- Below average (AR < 35%) → reduced cap hoặc pause
- New affiliate → 20-50 leads/day test cap

DYNAMIC ADJUSTMENT:
- Nếu tổng demand > cap → allocate theo AR ranking
- Nếu cap > demand → recruit thêm affiliates hoặc scale existing
- Monitor cap fill rate: < 70% = under-utilizing, > 95% = need more cap
```

## 5.7 Payout Management

### Khi nào tăng payout cho affiliate?

```
TĂNG khi:
├── Affiliate volume đang grow, AR tốt → incentivize scale
├── Competitor network offer payout cao hơn → giữ affiliate
├── Margin đủ để absorb
└── Strategic affiliate bạn muốn giữ

GIẢM khi:
├── AR giảm → payout chỉ cho approved, nên ok
├── Advertiser giảm revenue → phải adjust
├── Fraud detected → pause trước, investigate
└── Market rate giảm
```

### Payout Bumps & Special Terms

```
Standard Payout:    $8/approved (cho tất cả)
Volume Bump:        $9/approved (nếu > 100 leads/day)
VIP Bump:           $10/approved (top affiliate, exclusive)
Test Payout:        $6/approved (offer mới, chưa proven)
```

## 6.5 Metrics Deep Dive — Cách tính & ý nghĩa

### Core Metrics Formulas

```
CR (Conversion Rate) = Leads / Clicks × 100%
├── Click → Lead: phản ánh landing page quality
├── Benchmark: 5-15% cho nutra COD
└── Low CR? → LP issue, traffic mismatch, or offer fatigue

AR (Approval Rate) = Approved / Total Leads × 100%
├── Phản ánh toàn bộ chuỗi: traffic quality + call center + delivery
├── Benchmark: 30-55% tùy GEO
└── Low AR? → nhiều nguyên nhân, cần phân tích sâu

Trash Rate = Trash Leads / Total Leads × 100%
├── Phản ánh traffic quality
├── Target: < 15%
└── High trash? → bot traffic, incentivized traffic, or fraud

EPL (Earnings Per Lead) = Total Revenue / Total Leads
├── Bao nhiêu tiền kiếm được per lead
├── EPL > CPL = có lãi
└── Ví dụ: EPL $4.50, CPL $3.00 → ROI = 50%

EPC (Earnings Per Click) = Total Revenue / Total Clicks
├── Bao nhiêu tiền kiếm được per click
├── So sánh với CPC (cost per click) để biết profitable
└── Ví dụ: EPC $0.45, CPC $0.20 → có lãi

ROI = (Revenue - Cost) / Cost × 100%
├── Phản ánh profitability
├── Target: > 30%
├── ROI 0% = hòa vốn
└── ROI < 0% = lỗ

Margin Rate = (Revenue - Payout) / Revenue × 100%
├── Network giữ lại bao nhiêu %
├── Target: 20-40%
└── Margin quá thấp → rủi ro, margin quá cao → affiliate sẽ đi

Cap Fill Rate = Actual Leads / Cap × 100%
├── Bao nhiêu % cap đang được sử dụng
├── < 70% = under-utilized
├── > 95% = cần thêm cap
└── 100% = affiliates đang bị reject leads → bad UX
```

### Advanced Metrics

```
Effective AR = Approved / (Total Leads - Trash) × 100%
├── AR thực sau khi loại trash
└── Cho thấy quality thực sự

Confirm-to-Approve Ratio = Approved / Confirmed × 100%
├── % đơn confirmed mà thực sự deliver thành công
├── Phản ánh delivery quality
└── Low? → logistics issue

Time-to-Call = Thời gian trung bình từ lead → first call
├── Target: < 15 phút
├── > 1 giờ = bad
└── Impact trực tiếp lên confirm rate

Lead-to-Cash Days = Số ngày từ lead → nhận tiền
├── Cash flow indicator
├── Shorter = better
└── Typical: 30-60 ngày
```

```

# Chương 7: Đọc số liệu & Phân tích hiệu suất

## 7.1 Tư duy đọc số liệu

### Quy tắc #1: Luôn so sánh, KHÔNG nhìn số tuyệt đối

```
SAI:  "Hôm nay có 1,200 leads" → không biết tốt hay xấu
ĐÚNG: "Hôm nay 1,200 leads, tăng 8% vs hôm qua, giảm 3% vs tuần trước"

SAI:  "AR offer này 35%" → không biết tốt hay xấu
ĐÚNG: "AR 35%, thấp hơn benchmark GEO (42%), giảm 5pp vs tuần trước"
```

**So sánh với cái gì?**
- **DoD** (Day over Day): so với hôm qua
- **WoW** (Week over Week): so với cùng ngày tuần trước
- **MoM** (Month over Month): so với tháng trước
- **Benchmark**: so với target/KPI đã set
- **Peer**: so với offer/GEO/affiliate tương tự

### Quy tắc #2: Tìm nguyên nhân gốc (Root Cause)

```
Symptom: AR giảm từ 42% → 35%
                    ↓
Question 1: Giảm ở GEO nào?
    → Russia giảm, KZ stable
                    ↓
Question 2: Giảm ở offer nào trong Russia?
    → Offer SlimFit giảm, JointFlex stable
                    ↓
Question 3: Giảm ở affiliate nào trên SlimFit RU?
    → Affiliate A003 AR 22%, A001 vẫn 48%
                    ↓
Question 4: A003 thay đổi gì?
    → Đổi traffic source từ FB sang Push
                    ↓

                    ↓

### Quy tắc #3: Correlation ≠ Causation

```
Observation: AR giảm + Volume tăng đồng thời
    
CÓ THỂ:
a) Volume tăng → affiliate mới quality thấp → AR giảm (causal)
b) Mùa sale → nhiều người đặt bừa → cả volume và AR thay đổi (common cause)
c) Call center tuyển thêm nhân sự → handle nhiều hơn nhưng kém hơn (causal)

→ Cần investigate thêm trước khi kết luận
```

```

├── Quick check: AffScale platform status → DOWN / DEGRADED
└── Activate crisis mode

├── Notify: CMO + Tech lead + AM team lead

HOUR 1-2 (CONTAIN):
├── If platform-wide: Contact AffScale support / tech team

├── Alternative: Manual tracking (spreadsheet) temporarily

├── Fix identified and implemented
├── Verify: Test conversions flowing again
├── Reconcile: Count missed conversions, cross-check with advertiser CRM
└── Backfill: Credit affiliates for missed conversions

HOUR 4-24 (RECOVER):

├── All affiliates credited correctly
├── Advertiser notified of discrepancy
├── Dashboard data corrected
└── Communication: "Issue resolved" to all stakeholders

POST-INCIDENT (48h):
├── Root cause analysis document
├── Prevention measures identified
├── Monitoring improvements deployed
├── Lessons learned shared with team
└── Update SOP/playbook
```

### Case Study 1: "Offer weight loss mới tại Russia — Launch thành công"

```
BACKGROUND:

├── Call center confirm rate: 58%

QUYẾT ĐỊNH: SCALE

### Case Study 2: "AR crash ở Brazil — Diagnosis và Recovery"

```
BACKGROUND:
- Offer "MaxPotency" Brazil đang chạy 2 tháng
- Stable: 150 leads/day, AR 34%, margin $600/day
- Tuần này: AR crash xuống 18%

NGÀY 1 (DETECTION):
Dashboard sáng thứ Hai hiện:
├── AR 7-day average: 18% (was 34%)
├── Volume: 160 leads/day (stable)
├── Trash: 14% (stable)
└── ⚠️ Alert triggered

NGÀY 1 (INVESTIGATION):

Step 1: Break down by affiliate
├── A003: 80 leads/day, AR 20% (was 35%) → GIẢM
├── A005: 50 leads/day, AR 15% (was 32%) → GIẢM
├── A008: 30 leads/day, AR 18% (was 34%) → GIẢM
└── Observation: TẤT CẢ affiliates đều giảm → KHÔNG PHẢI traffic issue

Step 2: Check call center
├── Confirm rate: 55% → stable (không đổi)
├── Time-to-call: 12 phút → OK
└── Observation: Call center KHÔNG phải vấn đề

Step 3: Check delivery
├── Delivery rate: 48% (was 72%) → ĐÂY LÀ VẤN ĐỀ
├── Average delivery time: 22 ngày (was 14 ngày)

### Case Study 3: "Phát hiện và xử lý Fraud"

```
BACKGROUND:
- Affiliate A015 mới join 3 tuần
- Tuần 1-2: 30 leads/day, trash 12%, AR 38% → good
- Tuần 3: 150 leads/day, trash 8%, waiting AR...

DETECTION:
├── Volume 5x spike bắt thường
├── NHƯNG trash rate giảm (8%) → "tốt quá" cũng suspicious
├── Deep dive vào lead data...

INVESTIGATION:

1. Lead timestamp analysis:
   ├── 150 leads trong 10 giờ = 15 leads/hour
   ├── NHƯNG: leads đến exactly mỗi 4 phút
   └── 🔴 Pattern quá đều → likely automated

2. Phone number analysis:
   ├── Tất cả SĐT đều valid format (passed validation)
   ├── NHƯNG: 30% SĐT thuộc cùng 1 operator, same prefix
   └── 🔴 Clustered phone numbers → database injection

3. IP analysis:
   ├── 60% leads từ cùng 3 IP addresses
   └── 🔴 Concentrated IPs → not real diverse traffic

4. Call center feedback (khi bắt đầu gọi):
   ├── 70% SĐT → "không biết sản phẩm gì", "không đặt hàng"
   ├── 20% SĐT → không nghe máy
   ├── 10% SĐT → invalid (dù passed validation)
   └── Confirm rate: 5% (vs normal 55%)

DIAGNOSIS: 
A015 đang inject leads từ phone number database.
Tuần 1-2 chạy legit để build trust, tuần 3 switch sang fraud.

ACTION:
├── Day 0: Pause A015 immediately (cap = 0)
├── Day 0: Hold all pending payments ($1,200)
├── Day 1: Document evidence (timestamps, IPs, call center report)
├── Day 1: Notify A015: "Account suspended pending investigation"
├── Day 2: Calculate losses:
│   ├── 150 leads × 3 days = 450 fake leads
│   ├── If paid at $8/approved: potential fraud $0 (none approved)
│   ├── BUT call center cost wasted: ~$200
│   └── Opportunity cost: cap used for fake leads
├── Day 3: Decision: Ban permanent
├── Day 3: Add to blacklist (email, payment info, IP addresses)
└── Day 5: Post-mortem & rule update

NEW RULES IMPLEMENTED:
├── Auto-flag when volume increases > 3x in 24 hours
├── Auto-flag when lead interval is too regular (< 5% variance)
├── Max leads per IP per day: 5
├── Phone number cluster detection (> 20% same prefix)
└── Mandatory 14-day probation for new affiliates (low cap)

LESSONS:
├── "Good metrics" (low trash) can be faked
├── Volume spike from new affiliate = always investigate
├── Automated detection rules save time and money
├── Trust is built over time, not given upfront
└── Document everything for legal protection
```

### Case Study 4: "Mở thị trường mới — Vietnam"

```
BACKGROUND:
- Network chưa có presence ở Vietnam
- CMO muốn test VN do CPL rẻ và market growing
- Bạn được assign lead initiative

PHASE 1: MARKET RESEARCH (Week 1-2)
├── CPL benchmark VN: $0.3 - $1.5
├── AR benchmark: 25-45%
├── Popular categories: weight loss, beauty, male health
├── Traffic: Facebook dominant, TikTok growing fast
├── Delivery: GHN, Viettel Post, J&T → 2-5 days major cities
├── Call center: Vietnamese speaking required, cost ~$300/month/agent
├── Competitor analysis: networks active in VN: Dr.Cash, Everad, local networks

PHASE 2: PARTNERSHIP SETUP (Week 3-4)
├── Find advertiser with VN offers
├── Selected: 2 advertisers
│   ├── Adv A: 3 weight loss offers, has VN call center
│   └── Adv B: 2 beauty offers, has VN warehouse
├── Negotiate terms:
│   ├── Adv A: $6/approved, cap 50/day
│   └── Adv B: $5/approved, cap 30/day
├── Set payout to affiliates: $4/approved (margin ~$1.5-2)

PHASE 3: SOFT LAUNCH (Week 5-6)
├── Launch 5 offers on AffScale
├── Recruit VN-focused affiliates (3 found)
├── Results after 2 weeks:
│   ├── Offer VN-001 (weight loss): 40 leads/day, AR 32%, trash 15% → ✅
│   ├── Offer VN-002 (weight loss): 25 leads/day, AR 28%, trash 20% → ⚠️
│   ├── Offer VN-003 (weight loss): 15 leads/day, AR 22%, trash 25% → 🔴
│   ├── Offer VN-004 (beauty): 30 leads/day, AR 35%, trash 12% → ✅
│   └── Offer VN-005 (beauty): 10 leads/day, AR 18%, trash 30% → 🔴

PHASE 4: DECISION
├── Scale: VN-001, VN-004 (proven)
├── Optimize: VN-002 (potential, needs LP improvement)
├── Kill: VN-003, VN-005 (below threshold)
├── Recruit more affiliates
├── Cap increase for proven offers

MONTH 3 RESULTS:
├── VN contributing 5% of total network revenue
├── 3 offers active, 150 leads/day total
├── Average AR: 33%
├── Monthly margin: ~$2,700
├── Growing 15% month-over-month
├── Target: 10% of revenue within 6 months

LESSONS:
├── Start small: 5 offers, 3 affiliates → validate then scale
├── Beauty performs better than expected in VN
├── TikTok affiliates delivery better CR than Facebook in VN
├── Delivery is fast (VN advantage over Brazil/Indonesia)
├── Call center quality varies hugely → test 2-3 before committing
└── Local language LP is NON-NEGOTIABLE

│ └── Personal message from AM: "sorry and thank you for patience"
□ Share learnings with team

IMPORTANT: This incident will be remembered.
How you HANDLE it matters more than the fact it happened.
Fast response + transparent communication + fair reconciliation = 
affiliates stay loyal even after a bad day.
```

**BÀI HỌC:**
- Speed of response > perfect response
- Communicate TRƯỚC khi bạn có full picture
- "We're aware and working on it" > silence
- Affiliates forgive technical issues. They DON'T forgive being ignored.
- Always have a reconciliation plan
- Post-incident: prevention > blame

# Chương 13: SQL & Data Analysis cho MKT Ops

## 13.1 Tại sao SQL là skill bắt buộc?

Không biết SQL = phụ thuộc hoàn toàn vào Tech team mỗi khi cần data. Trong thực tế:

## 13.2 SQL Cơ bản — Những gì cần trong tuần đầu

### Database schema điển hình trong affiliate platform:

```
TABLES CHÍNH:

clicks
├── click_id (PK)
├── affiliate_id
├── offer_id
├── geo
├── timestamp
├── ip_address
├── user_agent
├── sub1, sub2, sub3, sub4, sub5
└── landing_page_id

leads
├── lead_id (PK)
├── click_id (FK → clicks)
├── affiliate_id
├── offer_id
├── geo
├── status (new/trash/confirmed/rejected/hold)
├── created_at
├── phone
├── name
└── address

conversions
├── conversion_id (PK)
├── lead_id (FK → leads)
├── click_id (FK → clicks)
├── affiliate_id
├── offer_id
├── status (confirmed/approved/returned/cancelled)
├── payout (số tiền trả affiliate)
├── revenue (số tiền từ advertiser)
├── approved_at
└── created_at

affiliates
├── affiliate_id (PK)
├── name
├── email
├── tier (A/B/C)
├── status (active/paused/banned)
├── payment_terms
└── created_at

offers
├── offer_id (PK)
├── name
├── advertiser_id
├── category
├── geo
├── payout
├── revenue
├── cap_daily
├── status (active/paused/test)
└── created_at
```

### Queries bạn PHẢI biết viết:

```sql
-- 1. Daily leads + approved + AR theo GEO (hôm qua)
SELECT
    geo,
    COUNT(*) as total_leads,
    SUM(CASE WHEN status = 'trash' THEN 1 ELSE 0 END) as trash,
    SUM(CASE WHEN status = 'approved' THEN 1 ELSE 0 END) as approved,
    ROUND(SUM(CASE WHEN status = 'approved' THEN 1 ELSE 0 END) * 100.0
          / COUNT(*), 1) as approval_rate,
    ROUND(SUM(CASE WHEN status = 'trash' THEN 1 ELSE 0 END) * 100.0
          / COUNT(*), 1) as trash_rate
FROM leads
WHERE DATE(created_at) = CURRENT_DATE - INTERVAL 1 DAY
GROUP BY geo
ORDER BY total_leads DESC;

-- 2. Top 10 affiliates by volume tuần này
SELECT
    a.name as affiliate_name,
    COUNT(l.lead_id) as leads,
    SUM(CASE WHEN l.status = 'approved' THEN 1 ELSE 0 END) as approved,
    ROUND(AVG(CASE WHEN l.status = 'approved' THEN 1.0 ELSE 0.0 END) * 100, 1) as ar,
    ROUND(AVG(CASE WHEN l.status = 'trash' THEN 1.0 ELSE 0.0 END) * 100, 1) as trash_rate,
    SUM(c.revenue) as total_revenue,
    SUM(c.payout) as total_payout,
    SUM(c.revenue) - SUM(c.payout) as margin
FROM leads l
JOIN affiliates a ON l.affiliate_id = a.affiliate_id
LEFT JOIN conversions c ON l.lead_id = c.lead_id
WHERE l.created_at >= DATE_TRUNC('week', CURRENT_DATE)
GROUP BY a.name
ORDER BY leads DESC
LIMIT 10;

-- 3. Hourly lead pattern (phát hiện bot traffic)
SELECT
    EXTRACT(HOUR FROM created_at) as hour,
    COUNT(*) as leads,
    COUNT(DISTINCT ip_address) as unique_ips,
    ROUND(COUNT(*) * 1.0 / NULLIF(COUNT(DISTINCT ip_address), 0), 1)
        as leads_per_ip
FROM leads
WHERE affiliate_id = 'A015'
  AND DATE(created_at) = '2026-04-01'
GROUP BY EXTRACT(HOUR FROM created_at)
ORDER BY hour;

-- 4. Offer performance trend (tuần qua, daily)
SELECT
    DATE(l.created_at) as date,
    COUNT(*) as leads,
    SUM(CASE WHEN l.status = 'approved' THEN 1 ELSE 0 END) as approved,
    ROUND(SUM(CASE WHEN l.status = 'approved' THEN 1 ELSE 0 END) * 100.0
          / COUNT(*), 1) as ar,
    SUM(c.revenue) as revenue,
    SUM(c.payout) as payout,
    SUM(c.revenue) - SUM(c.payout) as margin
FROM leads l
LEFT JOIN conversions c ON l.lead_id = c.lead_id
WHERE l.offer_id = 1234
  AND l.created_at >= CURRENT_DATE - INTERVAL 7 DAY
GROUP BY DATE(l.created_at)
ORDER BY date;

-- 5. Cohort analysis — AR theo ngày lead vào
SELECT
    DATE(l.created_at) as lead_date,
    COUNT(*) as total_leads,
    SUM(CASE WHEN c.status = 'approved'
         AND c.approved_at <= l.created_at + INTERVAL 7 DAY
         THEN 1 ELSE 0 END) as approved_7d,
    SUM(CASE WHEN c.status = 'approved'
         AND c.approved_at <= l.created_at + INTERVAL 14 DAY
         THEN 1 ELSE 0 END) as approved_14d,
    SUM(CASE WHEN c.status = 'approved' THEN 1 ELSE 0 END) as approved_total
FROM leads l
LEFT JOIN conversions c ON l.lead_id = c.lead_id
WHERE l.offer_id = 1234
  AND l.created_at >= '2026-03-01'
GROUP BY DATE(l.created_at)
ORDER BY lead_date;

-- 6. Duplicate phone detection
SELECT
    phone,
    COUNT(*) as times_submitted,
    COUNT(DISTINCT affiliate_id) as from_affiliates,
    MIN(created_at) as first_submit,
    MAX(created_at) as last_submit
FROM leads
WHERE created_at >= CURRENT_DATE - INTERVAL 7 DAY
GROUP BY phone
HAVING COUNT(*) > 1
ORDER BY times_submitted DESC
LIMIT 50;

-- 7. Revenue waterfall — this month vs last month by offer
SELECT
    o.name as offer_name,
    o.geo,
    SUM(CASE WHEN MONTH(c.approved_at) = MONTH(CURRENT_DATE)
         THEN c.revenue ELSE 0 END) as this_month,
    SUM(CASE WHEN MONTH(c.approved_at) = MONTH(CURRENT_DATE) - 1
         THEN c.revenue ELSE 0 END) as last_month,
    SUM(CASE WHEN MONTH(c.approved_at) = MONTH(CURRENT_DATE)
         THEN c.revenue ELSE 0 END) -
    SUM(CASE WHEN MONTH(c.approved_at) = MONTH(CURRENT_DATE) - 1
         THEN c.revenue ELSE 0 END) as change
FROM conversions c
JOIN offers o ON c.offer_id = o.offer_id
WHERE c.approved_at >= DATE_TRUNC('month', CURRENT_DATE) - INTERVAL 1 MONTH
GROUP BY o.name, o.geo
ORDER BY change DESC;
```

### Window Functions — Level trung cấp

```sql
-- Moving average AR 7 ngày (trend analysis)
SELECT
    date,
    daily_ar,
    ROUND(AVG(daily_ar) OVER (
        ORDER BY date ROWS BETWEEN 6 PRECEDING AND CURRENT ROW
    ), 1) as ma_7d_ar
FROM (
    SELECT
        DATE(created_at) as date,
        ROUND(SUM(CASE WHEN status='approved' THEN 1 ELSE 0 END)*100.0
              / COUNT(*), 1) as daily_ar
    FROM leads
    WHERE offer_id = 1234
      AND created_at >= CURRENT_DATE - INTERVAL 30 DAY
    GROUP BY DATE(created_at)
) daily
ORDER BY date;

-- Rank affiliates by AR within each GEO
SELECT
    geo,
    affiliate_name,
    leads,
    ar,
    RANK() OVER (PARTITION BY geo ORDER BY ar DESC) as rank_in_geo
FROM affiliate_performance_view
WHERE leads >= 50;
```

## 13.3 Google Sheets / Excel — Power User Skills

### Formulas bạn dùng hàng ngày:

```

COUNTIFS — đếm có điều kiện

IF + AND/OR — logic
=IF(AND(AR>=0.4, Trash<=0.15), "🟢", IF(AR>=0.3, "🟡", "🔴"))

Percentage change
=(B2-B1)/B1

Conditional formatting rules:

• AR 30-40% → yellow
• AR < 30% → red
• Trash > 20% → red text

# Chương 14: Fraud Detection & Anti-fraud Nâng cao

## 14.1 Landscape — Fraud trong Nutra Affiliate

```
CHI PHÍ FRAUD TRONG NGÀNH:

Ước tính 15-30% leads trong nutra affiliate là fraudulent
→ Nếu network xử lý 2,000 leads/ngày
→ 300-600 leads có thể là fake
→ Ở payout $8/lead → $2,400 - $4,800 / ngày tiền mất
→ $72,000 - $144,000 / tháng

PHÁT HIỆN VÀ CẮT ĐƯỢC FRAUD = TĂNG MARGIN NGAY LẬP TỨC
```

## 14.2 Phân loại Fraud chi tiết

### Type 1: Bot Traffic

```
MÔ TẢ:
Phần mềm tự động điền form, giả lập user thật

DẤU HIỆU:
├── Leads đến đều đặn (interval < 5% variance)
├── User agent giống nhau hoặc pattern lặp
├── IP addresses clustered
├── Session time gần như bằng 0 (instant form fill)
├── JavaScript disabled (bots thường không chạy JS)
├── No mouse movement / scroll events
└── Form fill time < 3 giây (người thật cần 15-60 giây)

TOOLS PHÁT HIỆN:
├── IP intelligence: MaxMind, IP2Location
├── Device fingerprinting: FingerprintJS
├── Behavioral analysis: time-on-page, mouse heatmap
└── Custom rules trên AffScale

PREVENTION:
├── CAPTCHA trên form (nhưng giảm CR cho real users)
├── Honeypot fields (hidden field, bot sẽ fill, real user không thấy)
├── JavaScript validation (require JS enabled)
├── Minimum time-on-page threshold
└── Rate limiting per IP
```

### Type 2: Click Fraud

```
MÔ TẢ:
Inflate click count để tăng EPC giả, hoặc steal conversions

SUBTYPES:

a) Click Injection (Mobile)
├── Malware trên phone user fire click ngay trước khi install
├── "Steal" attribution từ organic hoặc advertiser khác
└── Ít phổ biến trong nutra COD, chủ yếu mobile app

b) Click Spamming
├── Fire hàng triệu fake clicks hoping random match
├── Very low CR nhưng "có" conversions bằng xác suất
└── Detect: abnormally low CR (< 0.1%)

c) Click Stacking
├── Đặt nhiều click trackers chồng lên nhau
├── 1 real click = multiple tracked clicks
└── Detect: multiple clicks cùng timestamp, same user
```

### Type 3: Lead Injection / Database Stuffing

```
MÔ TẢ:
Affiliate inject leads từ database phone numbers mua ngoài chợ đen

DẤU HIỆU:
├── Volume spike mà không tương ứng tăng ad spend
├── Phone numbers từ cùng provider/prefix
├── Geographic mismatch (IP from Moscow, phone from Vladivostok)
├── Call center feedback: "Tôi không đặt hàng gì cả"
├── Very low confirm rate (< 10%) mặc dù trash thấp
└── Leads vào ngoài giờ cao điểm (3-5 AM)

PREVENTION:
├── Phone number validation API (Twilio Lookup, NumVerify)
├── IP-to-phone-area matching
├── Volume cap per affiliate per hour (not just daily)
├── Mandatory cooling period cho new affiliates
└── Random sample audit: call 10 leads hỏi "bạn có đặt hàng không?"
```

### Type 4: Incentivized Traffic

```
MÔ TẢ:
Affiliate hứa "quà miễn phí", "cashback" để lấy leads

DẤU HIỆU:
├── Leads "real" (SĐT đúng, có người nghe)
├── NHƯNG confirm rate rất thấp
├── Khách nói: "Tôi chỉ đăng ký lấy quà" / "Ai đó bảo tôi đăng ký"
├── AR thấp hơn rõ rệt vs cùng offer trên affiliates khác
└── Review landing page / creative của affiliate (nếu có access)

PREVENTION:
├── Trong hợp đồng affiliate: cấm incentivized traffic
├── Monitor confirm rate by affiliate (chỉ số quan trọng nhất)
├── Random landing page audit
└── Mystery shopping: đăng ký qua link affiliate xem flow thật
```

### Type 5: Cookie Stuffing / Attribution Fraud

```
MÔ TẢ:
Force cookies/clicks lên browser user mà user không biết

DẤU HIỆU:
├── Conversions from users who never visited LP
├── No pre-lander / LP view in click path
├── Click-to-conversion time abnormally short
└── Traffic source suspicious (porn, piracy sites)

PREVENTION:
├── S2S tracking (không dựa vào cookies)
├── Click-to-lead time analysis
├── Require LP view before lead accepted
└── Block known suspicious domains
```

### Type 6: Advertiser-side Fraud (Shaving)

```
MÔ TẢ:
ADVERTISER cắt bớt conversions, không tính tiền cho network

DẤU HIỆU:
├── Discrepancy > 5% giữa AffScale data và advertiser CRM
├── Discrepancy tăng dần theo thời gian (bắt đầu nhỏ, lớn dần)
├── Selective shaving: chỉ shave high-payout leads
├── "Technical issues" giải thích cho missing conversions
└── Competitor networks cũng report shaving từ cùng advertiser

ACTION:
├── Weekly reconciliation BẮT BUỘC
├── Demand lead-level reports từ advertiser
├── Cross-check click_ids: gửi list → advertiser phải account for all
├── If confirmed shaving > 5%: formal complaint → negotiate → switch
└── NEVER rely on 1 advertiser cho majority revenue
```

## 14.3 Anti-fraud Rules Engine

### Rules bạn nên implement:

```
AUTOMATED RULES (set trên AffScale hoặc custom):

TIER 1 — AUTO-PAUSE:
├── Trash rate > 35% trong 24h → pause affiliate
├── > 5 leads từ same IP trong 1 giờ → flag + hold
├── Form fill time < 3 giây → reject lead
├── Duplicate phone number within 7 days → reject
├── > 50 leads/hour từ 1 affiliate khi cap = 100/day → pause
└── Phone number fails validation → trash

TIER 2 — AUTO-FLAG (review manually):
├── Trash rate 20-35% → warning notification
├── Volume tăng > 3x trong 24h → flag for review
├── Leads từ VPN/proxy IP → flag
├── Night leads (00:00 - 06:00 local time) > 30% → flag
├── Click-to-lead time < 10 giây → flag
└── Same device fingerprint > 3 leads/day → flag

TIER 3 — MONITORING:
├── New affiliate first 14 days → enhanced monitoring
├── Affiliate switched traffic source → monitor 7 days
├── Payout increased → monitor quality 7 days
└── Seasonal anomaly (holiday traffic patterns) → adjust thresholds
```

### Fraud Score Model (đơn giản)

```
Mỗi lead được tính fraud score 0-100:

FACTOR                          POINTS
─────────────────────────────────────────
Known VPN/proxy IP              +30
Form fill time < 5 sec          +20
Duplicate phone (7 days)        +25
IP-phone geo mismatch           +15
Suspicious user agent           +15
Night submission (00-06)        +10
No JS / no cookies              +20
Referrer missing/suspicious     +10
Same device fingerprint reuse   +20

THRESHOLDS:
├── Score 0-30:  Accept normally
├── Score 31-50: Accept but flag for review
├── Score 51-70: Hold for manual review
└── Score 71+:   Auto-reject / trash
```

## 14.4 Fraud Investigation Workflow

```
SOP: FRAUD INVESTIGATION
═════════════════════════

TRIGGER: Affiliate flagged by automated rules OR manual detection

STEP 1: ISOLATE (0-30 minutes)
├── Reduce affiliate cap to minimum (not full pause yet)
├── Start collecting evidence
└── Do NOT alert affiliate yet

STEP 2: GATHER DATA (30 min - 2 hours)
├── Pull last 7-14 days of lead data
├── Run fraud detection queries (timestamp, IP, phone patterns)
├── Check call center feedback for this affiliate's leads
├── Compare AR with same offer/GEO on other affiliates
└── Screenshot any suspicious landing pages

STEP 3: ANALYZE (1-2 hours)
├── Calculate fraud percentage estimate
├── Calculate financial exposure
├── Determine fraud type
└── Assess: intentional fraud or poor quality traffic?

STEP 4: DECIDE
├── If clear fraud (> 50% fake leads): BAN + hold payment
├── If borderline (20-50% suspicious): Warning + reduced cap + probation
├── If poor quality (not intentional): Education + guidelines + monitor
└── Document decision and reasoning

STEP 5: ACT
├── Execute decision on AffScale
├── Communicate to affiliate (via AM)
├── Adjust automated rules if gap found
├── Report to Finance (payment hold/adjustment)
└── Update blacklist if banned

STEP 6: POST-MORTEM
├── How did fraud get through?
├── What rules need updating?
├── Total financial impact?
└── Share learnings with team
```

# Chương 15: Negotiation & Stakeholder Management

## 15.1 Bối cảnh đàm phán trong Affiliate

Bạn đàm phán hàng ngày, với nhiều bên khác nhau:

```
BẠN (MKT Ops) đàm phán với:

┌──────────────────────────────────────────────────┐
│ ADVERTISER (qua AR team)                         │
│ Đàm phán: payout, cap, terms, SLA, stock         │
│ Leverage: volume, quality traffic, reliability    │
│ Risk: họ giảm payout, shave, dừng offer          │
└──────────────────────────────────────────────────┘

┌──────────────────────────────────────────────────┐
│ AFFILIATES (qua AM team)                         │
│ Đàm phán: payout bumps, exclusive terms          │
│ Leverage: good offers, fast payment, support      │
│ Risk: họ chuyển network, gửi bad traffic         │
└──────────────────────────────────────────────────┘

┌──────────────────────────────────────────────────┐
│ INTERNAL TEAMS                                    │
│ Đàm phán: resources, priorities, budget           │
│ Leverage: data, ROI arguments, CMO backing        │
│ Risk: misalignment, slow execution               │
└──────────────────────────────────────────────────┘

┌──────────────────────────────────────────────────┐
│ CMO / C-SUITE                                     │
│ Đàm phán: targets, budget, headcount, authority   │
│ Leverage: performance data, market intelligence   │
│ Risk: unrealistic targets, budget cut             │
└──────────────────────────────────────────────────┘
```

## 15.2 Framework đàm phán — BATNA

```
BATNA = Best Alternative To a Negotiated Agreement
(Phương án tốt nhất nếu đàm phán thất bại)

VÍ DỤ: Affiliate A01 đòi tăng payout từ $10 → $12

YOUR BATNA:
├── Alternative affiliates có thể replace volume? Có, nhưng cần 2-3 tuần
├── Revenue loss nếu A01 rời? -$30K/tháng
├── Cost of replacement? ~$5K (recruitment, ramp-up)
└── BATNA quality: TRUNG BÌNH (có alternative nhưng costly)

A01's BATNA:
├── Other networks đang offer bao nhiêu? $11-11.50
├── Cost for A01 to switch? Low (easy to change tracking link)
├── Time to ramp on new network? 1-2 ngày
└── BATNA quality: TỐT (dễ switch)

→ A01 có BATNA tốt hơn bạn → bạn ở thế yếu hơn
→ Nên negotiate: $10.50-$11 + thêm value (priority support, fast payment)
→ ĐỪNG let it reach $12 (margin sẽ quá thấp)
```

### ZOPA — Zone of Possible Agreement

```
VÍ DỤ: Đàm phán payout tăng cho A01

A01 minimum acceptable:  $11.00 (dưới này họ sẽ đi)
Your maximum acceptable:  $11.50 (trên này margin quá thấp)

ZOPA = $11.00 — $11.50

Chiến thuật:
├── Bắt đầu offer $10.25 (anchor thấp)
├── Let them counter $11.50
├── Meet around $10.75 - $11.00
├── Tie to conditions: "$ 11 nếu volume ≥ 400/day, AR ≥ 42%"
└── Add non-monetary value: dedicated AM, weekly report, first access to new offers
```

## 15.3 Negotiation Playbooks

### Playbook 1: Advertiser giảm Payout

```
TÌNH HUỐNG: Advertiser thông báo giảm revenue từ $14 → $12

PREPARATION:
├── Know your numbers:
│   ├── Current margin: $4/lead ($14 rev - $10 payout)
│   ├── New margin: $2/lead ($12 rev - $10 payout)
│   ├── Volume: 200 approved/day
│   └── Monthly impact: $12,000 margin loss
├── Know their motivation:
│   ├── Why reducing? Market? Competition? Margin squeeze?
│   └── Are they reducing for all networks or just you?
├── Know your BATNA:
│   ├── Alternative advertisers for same product/GEO?
│   ├── How fast can you switch?
│   └── Volume impact?
└── Know your leverage:
    ├── How much volume do you send them?
    ├── What's your quality (AR) vs other networks?
    └── How dependent are they on you?

NEGOTIATION SCRIPT:
"Chúng tôi hiểu pressure từ thị trường. Tuy nhiên, ở mức $12:
 - Margin của chúng tôi giảm 50%, khó sustain volume hiện tại
 - Chúng tôi sẽ buộc phải giảm payout cho affiliates → volume giảm
 - Các bạn sẽ mất ~30% volume nếu chúng tôi không thể cạnh tranh

 Đề xuất:
 Option A: Giữ $13.50 (compromise) với cam kết volume 250/day
 Option B: $12 nhưng priority cap khi stock có hạn
 Option C: $12 base + $1 bonus cho leads có AR > 50%"

IF THEY REFUSE ALL:
├── Accept $12 nhưng NGAY LẬP TỨC giảm affiliate payout ($10→$8.50)
├── Parallel: source alternative advertiser
├── Gradual volume reduction (signal: you're diversifying)
└── Renegotiate after 30 days with data
```

### Playbook 2: Top Affiliate đòi tăng Payout

```
TÌNH HUỐNG: A01 yêu cầu $12 (hiện $10), nói "Network X offer $11.50"

PREPARATION:
├── Verify claim: hỏi AM check market rates discreetly
├── Calculate maximum: margin cho phép bao nhiêu?
├── Assess A01's true value: volume, quality, loyalty history
└── Prepare non-monetary sweeteners

RESPONSE FRAMEWORK:

1. Acknowledge their value (đừng dismiss):
   "Chúng tôi đánh giá cao partnership. A01 là top performer."

2. Validate data (không promise ngay):
   "Cho phép chúng tôi review data 24 giờ để đưa ra đề xuất fair nhất."

3. Counter-offer (24h sau):
   "Based on data: $10.75 base + bonus structure:
    - ≥ 400 leads/day: +$0.50 (→ $11.25)
    - AR ≥ 45%: +$0.25 (→ $11.50)
    - Exclusive: first access mọi offer mới
    - Payment: Net-7 thay vì Net-15"

4. Create switching cost:
   ├── Custom dashboard for A01
   ├── Dedicated AM / priority Telegram support
   ├── Performance bonus quarterly
   └── Make leaving PAINFUL (not with threats, with VALUE)

GOLDEN RULE:
Đừng bao giờ match exact competitor price.
Nếu bạn match $11.50, tuần sau họ sẽ nói "Network Z offer $12.50"
→ Bạn luôn ở thế reactive.
Thay vào đó: build total value package > competitor's raw payout.
```

### Playbook 3: Internal — Xin budget / resources từ CMO

```
FRAMEWORK: Problem → Impact → Solution → Ask

"CMO, tôi có 1 đề xuất:

PROBLEM:
Hiện tại daily report mất 45 phút/ngày vì manual.
Fraud detection hoàn toàn reactive (phát hiện sau 2-3 ngày).

IMPACT:
├── 45 min × 22 days = 16.5 giờ/tháng tôi mất cho manual work
├── Fraud undetected cost: ước tính $5K-10K/tháng
└── Opportunity cost: thời gian đó có thể dùng cho strategic work

SOLUTION:
├── Invest trong automated reporting (Google Apps Script + Slack)
├── Implement fraud scoring rules trên AffScale
├── Estimate: 2 tuần build + $500 tools cost

ASK:
├── Approve $500 budget cho tools
├── Approve 2 tuần focus time (giảm meeting load)
└── Expected ROI: save $5K+/tháng fraud + 16 giờ/tháng time"
```

## 15.5 Storytelling with Data — Trình bày thuyết phục

### Framework: So What? → Now What?

```
SAI (data dump):
"Tuần này revenue $78K, leads 15,120, AR 38.4%, KZ tăng 10.5%,
BR giảm 8.4%, trash rate 12.8%..."
→ CMO: "Vậy sao? Tôi phải làm gì?"

ĐÚNG (insight-driven):
"Tuần này chúng ta vượt revenue target 4% nhờ KZ scaling.
Tuy nhiên, Brazil đang trong week thứ 3 giảm liên tiếp — nếu
không act, chúng ta sẽ mất $15K/tháng.
Tôi recommend: [3 specific actions]."
→ CMO: "OK, approved. Proceed."

STRUCTURE:
1. HEADLINE (1 câu): The most important thing
2. CONTEXT (2-3 câu): Why it matters
3. DATA (chart/table): Evidence
4. INSIGHT (1-2 câu): What the data MEANS
5. RECOMMENDATION (bullets): What to DO
6. ASK (1 câu): What you need from them
```

# Chương 16: Automation & Process Engineering

## 16.1 Automation Mindset

```
QUY TẮC: Nếu bạn làm 1 việc > 3 lần/tuần và nó có pattern lặp lại → AUTOMATE

Ví dụ các việc nên automate:
├── Daily report → auto-generate + send to Slack
├── Alert khi AR drop → auto-detect + notify
├── Affiliate trash rate check → auto-pause khi vượt threshold
├── Weekly reconciliation → auto-pull data + flag discrepancies
├── Cap utilization check → auto-alert khi under/over-utilized
└── New lead notification → auto-route to call center
```

## 16.2 Automation Stack cho MKT Ops

```
TIER 1: No-code (Bắt đầu từ đây)
├── Google Sheets + formulas + Apps Script
├── Zapier (https://zapier.com) — connect 5,000+ apps
├── Make/Integromat (https://www.make.com) — more powerful than Zapier
└── Slack Workflows + Incoming Webhooks

TIER 2: Low-code
├── Google Apps Script (JavaScript based, free)
├── Python scripts (nếu bạn biết code)
├── AffScale API + webhooks
└── Retool (https://retool.com) — build internal tools fast

TIER 3: Full automation
├── Custom dashboard (Metabase/Looker connected to database)
├── Airflow / cron jobs cho scheduled tasks
├── Custom fraud scoring system
└── ML-based anomaly detection
```

## 16.3 Automation Recipes thực tế

### Recipe 1: Auto Daily Report to Slack

```
FLOW:
Google Sheets (data source)
    → Google Apps Script (format report)
    → Slack Webhook (post to channel)

GOOGLE APPS SCRIPT:
─────────────────────

function sendDailyReport() {
  var sheet = SpreadsheetApp.getActiveSpreadsheet()
                            .getSheetByName('DailyMetrics');

  // Get today's data
  var today = sheet.getRange('B2').getValue();     // Total leads
  var approved = sheet.getRange('B3').getValue();   // Approved
  var ar = sheet.getRange('B4').getValue();         // AR %
  var revenue = sheet.getRange('B5').getValue();    // Revenue
  var margin = sheet.getRange('B6').getValue();     // Margin
  var alerts = sheet.getRange('B7').getValue();     // Alert text

  // Format message
  var message = {
    "text": ":chart_with_upwards_trend: *DAILY REPORT — "
            + new Date().toLocaleDateString() + "*\n\n"
            + "Leads: *" + today + "* | Approved: *" + approved
            + "* | AR: *" + ar + "%*\n"
            + "Revenue: *$" + revenue + "* | Margin: *$" + margin + "*\n"
            + (alerts ? "\n:warning: *Alerts:*\n" + alerts :
               "\n:white_check_mark: No alerts")
  };

  // Send to Slack
  var webhook = 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL';
  UrlFetchApp.fetch(webhook, {
    method: 'post',
    contentType: 'application/json',
    payload: JSON.stringify(message)
  });
}

// Schedule: Triggers → Time-driven → Day timer → 9:00-10:00 AM
```

### Recipe 2: Auto Alert khi AR Drop

```
FLOW (Zapier/Make):

Trigger: Schedule (every 1 hour)
    → Action: Fetch data from Google Sheets / API
    → Filter: AR < threshold cho bất kỳ offer nào
    → Action: Send Slack alert + Email

ZAPIER SETUP:
1. Trigger: Schedule by Zapier (every 1 hour)
2. Action: Google Sheets — Get Row (latest metrics row)
3. Filter: Only continue if AR < 35%
4. Action: Slack — Send Channel Message
   Channel: #mkt-ops-alerts

```

        trash_count = count where status = 'trash'
        trash_rate = trash_count / last_24h_leads

        IF trash_rate > 0.35 AND last_24h_leads > 20:
            → Set affiliate cap = 0 (auto-pause)
            → Send Slack alert: "Auto-paused {affiliate} — trash {trash_rate}%"

        ELIF trash_rate > 0.25 AND last_24h_leads > 20:

            → Flag for manual review

# Chương 17: Compliance, Regulation & Legal

## 17.1 Tại sao Compliance quan trọng trong Nutra?

```
NUTRA = HIGH-RISK VERTICAL

Rủi ro nếu vi phạm:
├── Landing page bị ban → mất traffic source → revenue = 0
├── Advertiser bị cơ quan quản lý phạt → dừng offer → mất revenue
├── Payment processor ban → không nhận/gửi tiền được
├── Legal action → phạt tiền, kiện tụng
└── Reputation damage → affiliates và advertisers không muốn hợp tác
```

## 17.2 Regulation theo GEO

### Russia (RU) — CIS

```
CƠ QUAN: FAS (Federal Antimonopoly Service) — Roskomnadzor

RULES:
├── Quảng cáo thuốc / thực phẩm chức năng cần disclaimer
├── Cấm claim "chữa khỏi" bệnh (chỉ được nói "hỗ trợ")
├── Cần ghi rõ "NOT a medicine" trên landing page
├── Celebrity endorsement cần consent thật
│   (Fake doctor/celebrity testimonials = vi phạm)
├── "Before/after" photos cần real results
└── Age restriction warnings cho certain products

THỰC TẾ:
├── Enforcement level: TRUNG BÌNH
├── Hầu hết affiliates dùng cloaking để bypass
├── Nhưng nếu bị catch → fine + block domain
└── Trend: enforcement đang TĂNG dần

TRÊN LANDING PAGE CẦN CÓ:
├── Disclaimer: "Đây không phải thuốc điều trị"
├── "Hãy tham khảo ý kiến bác sĩ"
├── Thông tin nhà sản xuất thật
├── Chính sách hoàn trả
└── Thông tin liên hệ thật
```

### Brazil (BR)

```
CƠ QUAN: ANVISA (Agência Nacional de Vigilância Sanitária)

RULES:
├── Sản phẩm health phải có đăng ký ANVISA
├── Cấm claim chữa bệnh
├── Quảng cáo phải bằng tiếng Bồ Đào Nha
├── Cần hiển thị CNPJ (company registration number)
├── "Before/after" photos bị hạn chế
├── LGPD (Lei Geral de Proteção de Dados) — data privacy law
│   ├── Tương tự GDPR của EU
│   ├── Consent rõ ràng trước thu thập data
│   └── Right to delete
└── Bưu phẩm có thể bị customs kiểm tra → product phải legit

THỰC TẾ:
├── Enforcement: TRUNG BÌNH - CAO
├── ANVISA active check online products
├── Customs có thể giữ hàng nếu không có giấy tờ
└── LGPD enforcement đang tăng (fines đã có)
```

### Thailand (TH)

```
CƠ QUAN: FDA Thailand + Office of Consumer Protection Board

RULES:
├── Sản phẩm health/beauty cần FDA Thailand approval
├── Cấm claim "giảm X kg trong Y ngày" (specific claims)
├── Label phải bằng tiếng Thái
├── Online advertising cần comply với Computer Crime Act
├── PDPA (Personal Data Protection Act) — effective 2022
│   ├── Consent required
│   ├── Data breach notification mandatory
│   └── Cross-border transfer restrictions
└── Celebrity endorsement phải real

THỰC TẾ:
├── Enforcement: TRUNG BÌNH
├── FDA Thailand check Shopee/Lazada nhiều hơn direct
├── Nhưng complaint-based enforcement tồn tại
└── PDPA mới → đang trong giai đoạn enforce
```

### General Rules áp dụng MỌI GEO

```
KHÔNG BAO GIỜ được claim trên Landing Page:

❌ "Chữa khỏi [bệnh] trong X ngày"
❌ "Bác sĩ [tên thật] khuyên dùng" (nếu fake)
❌ "Đã được FDA/WHO approved" (nếu không thật)
❌ "100% không tác dụng phụ"
❌ "Giảm 20kg trong 2 tuần" (specific unrealistic claims)
❌ Fake news articles (impersonating CNN, BBC, etc.)
❌ Fake customer reviews (with stock photos)

CÓ THỂ nói:
✅ "Hỗ trợ quá trình [giảm cân/đẹp da/...]"
✅ "Thành phần tự nhiên"
✅ "Nhiều người đã thử và hài lòng"
✅ "Kết quả có thể khác nhau tùy người" (disclaimer)
✅ Real testimonials (với consent)
```

## 17.3 Traffic Source Compliance

### Facebook/Meta Advertising Policies

```
FACEBOOK CẤM NUTRA:

Facebook chính thức CẤM:
├── Before/after images
├── Health claims
├── Misleading buttons/UI elements
├── Cloaking (hiện page khác cho reviewer)
└── Supplements making disease claims

THỰC TẾ TRONG NGÀNH:
├── 90%+ nutra affiliates dùng cloaking trên Facebook
├── Facebook AI đang improve detection
├── Account ban rate cao (5-30 accounts/tháng cho 1 buyer)
├── Cost: mỗi banned account = $250+ (BM, cards, warmup)
└── Cat-and-mouse game liên tục

BẠN (MKT Ops) CẦN BIẾT:
├── Bạn KHÔNG trực tiếp chạy ads (affiliates chạy)
├── NHƯNG bạn cần hiểu rủi ro
├── Top affiliates bị ban = volume drop ngay
├── Diversify traffic sources = risk mitigation
└── Track account survival rate per affiliate/creative type
```

### Google Ads

```
Google stricter hơn Facebook cho nutra
├── Hầu như không thể chạy nutra trực tiếp
├── Cần LegitScript certification cho supplements (US)
├── Không dùng cloaking (Google detect tốt hơn FB)
└── Chủ yếu dùng cho remarketing hoặc branded terms
```

### Native Ads (MGID, Taboola, Outbrain)

```
Native networks lenient hơn Facebook/Google:
├── MGID: rất phổ biến cho nutra CIS/Latam
├── Taboola: trung bình strict
├── Outbrain: strict hơn Taboola
├── Creative guidelines: no fake news, no extreme before/after
└── Approval process: manual review, 24-48h
```

## 17.4 Payment Compliance

```
KYC (Know Your Customer):
├── Affiliate registration cần verify identity
├── Payment method verification
├── Address verification cho high-value affiliates
└── Company registration documents (cho corporate affiliates)

AML (Anti-Money Laundering):
├── Monitor large/unusual payments
├── Flag sudden payout increases
├── Report suspicious patterns to compliance
└── Keep payment records minimum 5 years

PAYMENT PROCESSOR RISK:
├── PayPal: rất strict với nutra → dễ bị frozen
├── Stripe: không accept nutra merchants
├── Wire transfer: safe nhưng chậm, phí cao
├── Payoneer: phổ biến cho affiliate payments
├── Crypto: growing, nhưng regulatory uncertainty
└── Tipalti: enterprise-level, handles compliance
```

### Major Advertisers / Product Owners

```
TIER 1 — LARGE ADVERTISERS
═══════════════════════════

Advertisers trong nutra thường private companies, ít public info.
Cách identify:

1. Xem offer sources trên các network lớn
2. Check landing pages → tìm company info footer
3. Ask AR team cho advertiser list

TYPICAL ADVERTISER PROFILES:

TYPE A: "Full Stack" Advertiser
├── Own products + Call center + Warehouse + Fulfillment
├── Ví dụ: Everad (khi họ advertise trên network khác)
├── Pros: reliable, full control
├── Cons: có thể trở thành competitor
└── Thường là partner tốt nhất

TYPE B: "Product + CC" Advertiser
├── Own products + Call center, outsource fulfillment
├── Pros: good at conversion (own CC)
├── Cons: delivery issues (3rd party logistics)
└── Cần monitor delivery SLA

TYPE C: "Product Only" Advertiser
├── Only own product, outsource CC + fulfillment
├── Pros: can focus on product quality

# Chương 20: Crisis Management, Conflict Resolution & Leadership

## 20.1 Crisis Management Framework

### Phân loại Crisis theo mức độ

```
CRISIS SEVERITY LEVELS:
═══════════════════════

LEVEL 1 — MINOR (Bạn tự handle)
├── 1 offer AR drop < 10pp
├── 1 affiliate quality issue
├── Minor tracking glitch (< 1 hour)
├── Stock low (not out) on 1 offer
├── Impact: < $2K/day revenue
└── Response time: within same day

LEVEL 2 — MODERATE (Bạn + CMO)
├── Multiple offers affected
├── Top affiliate threatens to leave
├── Tracking down 1-4 hours
├── OOS on key offer
├── Impact: $2K-10K/day revenue
└── Response time: within 2 hours

LEVEL 3 — SEVERE (CMO + C-suite)
├── Platform-wide tracking failure
├── Top 3 affiliates issue simultaneously
├── Advertiser payment default > $20K
├── Compliance/legal threat
├── Impact: > $10K/day revenue
└── Response time: within 1 hour

LEVEL 4 — EXISTENTIAL (All hands + Legal)
├── Regulatory action against company
├── Payment processor ban
├── Mass affiliate exodus
├── Major fraud discovered (internal)
├── Data breach
├── Impact: threatens business continuity
└── Response time: IMMEDIATE
```

### Crisis Response Protocol — Step by Step

```
THE OODA LOOP (Military decision framework, adapt for business):

OBSERVE → ORIENT → DECIDE → ACT → (repeat)

OBSERVE (Minutes 0-15):
├── What happened? (symptoms, not causes yet)
├── What's the scope? (1 offer? 1 GEO? all?)
├── What's the current impact? (leads, revenue per hour)
├── Who's affected? (affiliates, advertisers, internal)
└── Is it getting worse or stable?

ORIENT (Minutes 15-30):
├── What could be causing this? (top 3 hypotheses)
├── Have we seen this before? (check incident history)
├── What information do we need to confirm?
├── Who do we need to involve?
└── What's the worst case if we don't act for 1 hour?

DECIDE (Minutes 30-45):
├── Choose immediate action (contain, not fix yet)
├── Choose communication plan (who to tell, what to say)
├── Assign roles (who investigates, who communicates)
├── Set review checkpoint (30 min or 1 hour)
└── Document decision and reasoning

ACT (Minutes 45+):
├── Execute containment (pause, cap reduce, redirect)
├── Send communications (affiliates, internal, advertiser)
├── Begin root cause investigation
├── Monitor: is containment working?
└── Update stakeholders at checkpoints
```

## 20.2 Conflict Resolution — Giữa các Teams

### Conflict phổ biến nhất

```
CONFLICT 1: AM Team vs Ops (BẠN) — Payout Disputes
═══════════════════════════════════════════════════

AM muốn: Tăng payout để giữ affiliate / recruit affiliate mới
Bạn muốn: Protect margin, chỉ tăng khi justified

TÌNH HUỐNG THỰC TẾ:
AM: "A01 sẽ rời nếu không tăng payout lên $12. Phải approve ngay!"
Bạn: "Margin sẽ giảm xuống 14%. Không sustainable."
AM: "Nếu mất A01, revenue drop $30K/tháng. Chọn đi!"

CÁCH XỬ LÝ:

❌ SAI:
├── "Không, policy là margin > 25%." (rigid, không collaborative)
├── "OK tăng đi." (cave in, lose margin long-term)
└── Escalate ngay lên CMO (looks like you can't handle)

✅ ĐÚNG:
1. Acknowledge urgency: "Tôi hiểu A01 quan trọng. Cùng giải quyết."
2. Get data: "Cho tôi 2 giờ check market rates và calculate options."
3. Present options WITH DATA:
   "A01 đang làm $56K/tháng cho chúng ta. Margin $20K/tháng.

   Option A: Tăng lên $11 (không phải $12) + Net-7 payment + VIP support
   → Margin giảm $6K/tháng nhưng còn $14K = 25% OK

   Option B: Tăng lên $11.50 BUT tie to performance: AR ≥ 43%, volume ≥ 400/day
   → Nếu đạt: margin vẫn OK vì volume tăng offset payout increase

   Option C: Match $12 nhưng chỉ cho 30 ngày trial
   → Review sau 30 ngày. Nếu margin < 20% → revert"

4. Seek agreement: "Tôi recommend Option B. Bạn thấy sao?"
5. If disagreement continues → escalate WITH both options to CMO

KEY PRINCIPLE:
Never say "No" without "But here's what we CAN do"
AM team is not your enemy — they want revenue too.
```

```
CONFLICT 2: AR Team vs Ops (BẠN) — Offer Quality
═════════════════════════════════════════════════

AR team muốn: Launch offer nhanh (KPI họ = number of new offers)
Bạn muốn: Quality gate — chỉ launch offer pass test criteria

TÌNH HUỐNG:
AR: "Advertiser mới có 5 offers, cần launch tuần này."
Bạn: "Advertiser này chưa verified. Chúng ta chưa biết AR sẽ ra sao."
AR: "Nếu chờ, competitor sẽ grab exclusive trước."

CÁCH XỬ LÝ:

1. Find the YES inside the NO:
   "OK, launch được — NHƯNG với safeguards:
   ├── Cap test: 30 leads/day (không phải 200)
   ├── Duration: 10 ngày test
   ├── Max loss accepted: $500
   ├── Chỉ dùng 1-2 trusted affiliates (không blast)
   └── AR team phải provide: advertiser references, payment proof"

2. Create a shared framework:
   "Để lần sau không phải debate mỗi lần, cùng agree:
   ├── New advertiser → mandatory test phase (SOP #2)
   ├── Existing advertiser → fast-track OK
   └── Risk level determines cap & duration"

3. Document the agreement → becomes SOP
```

```
CONFLICT 3: Finance vs Ops (BẠN) — Cash Flow
════════════════════════════════════════════

Finance muốn: Hold affiliate payments longer (improve cash flow)
Bạn muốn: Pay on time (keep affiliates happy)

TÌNH HUỐNG:
Finance: "Chúng ta cần chuyển từ Net-7 sang Net-15 cho tất cả affiliates."
Bạn: "Top affiliates sẽ rời. Họ cần cash flow để mua traffic."

CÁCH XỬ LÝ:

1. Quantify the risk:
   "Nếu chuyển Net-15:
   ├── Estimated 3-5 top affiliates sẽ reduce volume hoặc chuyển network
   ├── Revenue impact: -$40K-80K/tháng
   ├── Cash saved: ~$15K (delay 1 week of payments)
   └── Net impact: NEGATIVE"

2. Propose compromise:
   "Tier A (top 5): keep Net-7 (revenue justifies)
    Tier B (mid 13): move to Net-10 (from Net-7)
    Tier C (small 16): move to Net-15 (they have less leverage)

    Cash flow improvement: ~$8K
    Revenue risk: minimal (Tier C contributes only 8%)"

3. Set SLA with Finance:
   "Advertiser payments overdue > 7 days → reduce affiliate volume
    (không phải delay affiliate payment)"
```

```
CONFLICT 4: Media Buying vs Ops (BẠN) — Quality vs Volume
══════════════════════════════════════════════════════════

Media buyers muốn: Scale volume (KPI = leads)
Bạn muốn: Quality (AR > threshold)

TÌNH HUỐNG:
Media: "Tôi tìm được source mới, có thể tăng volume 3x. CPL rất rẻ."
Bạn: "Push traffic? Trash rate thường 25%+."
Media: "Nhưng ROI vẫn positive vì CPL thấp."

CÁCH XỬ LÝ:

1. Don't block — CREATE GUARDRAILS:
   "OK test, nhưng:
   ├── Separate tracking (sub ID riêng cho push traffic)
   ├── Cap: 50 leads/day max cho test
   ├── Auto-pause nếu trash > 25% trong 48h
   ├── Evaluate after 7 days with REAL AR (not projected)
   └── Media buyer KPI should include quality metric, not just volume"

2. Propose KPI adjustment (long-term fix):
   "Media buyer KPI hiện tại: Leads generated
    Proposed KPI: Approved leads × margin
    → This aligns incentives. They'll self-optimize for quality."
```

## 20.3 Handling Difficult Conversations

### Framework: COIN (Context, Observation, Impact, Next steps)

```
EXAMPLE: Warning an underperforming affiliate

CONTEXT:
"A12, chúng tôi rất appreciate partnership 2 tháng qua."

OBSERVATION:
"Tôi thấy trong 2 tuần gần đây, trash rate tăng từ 12% lên 22%,

IMPACT:
"Ở mức này, offer không profitable cho cả 2 bên.

NEXT STEPS:
"Chúng tôi cần trash rate dưới 18% trong 7 ngày tới.

- Review lại traffic source hiện tại

## 20.4 Team Leadership for MKT Ops

### 1-on-1 Meeting Framework

```
1:1 WITH DIRECT REPORTS (Weekly, 30 min)
════════════════════════════════════════

STRUCTURE:
├── 5 min: THEM first — What's on your mind?
├── 10 min: THEIR wins + challenges this week
├── 10 min: YOUR feedback + priorities for next week
└── 5 min: Growth/development check-in

QUESTIONS THAT WORK:
├── "What's blocking you right now?"
├── "What's one thing we should stop doing?"
├── "If you had my authority for a day, what would you change?"
├── "What should I know about that I probably don't?"
└── "How can I help you do your best work?"

QUESTIONS TO AVOID:
├── "Is everything OK?" (too vague, gets "yes")
├── "Why did that happen?" (sounds accusatory)
└── "Can you just..." (minimizing their workload)
```

### Building Data-Driven Culture

```
HOW TO BUILD ACCOUNTABILITY:

1. VISIBILITY — Make metrics PUBLIC
   ├── Team dashboard visible to everyone
   ├── Weekly metrics review in team meeting
   ├── Personal KPIs visible to individuals
   └── "What gets measured gets managed"

2. OWNERSHIP — Assign CLEAR owners
   ├── Every KPI has ONE owner
   ├── Every action item has ONE owner + deadline
   ├── "Nếu không có tên người chịu trách nhiệm → sẽ không ai làm"
   └── Review ownership in weekly meeting

3. RITUALS — Make it a HABIT
   ├── Daily standup: 15 min, same time, every day
   ├── Weekly review: numbers first, stories second
   ├── Monthly retro: what worked, what didn't, what to change
   └── Quarterly goals: OKR or similar framework

4. PSYCHOLOGICAL SAFETY — Make it OK to FLAG PROBLEMS
   ├── Celebrate people who find problems EARLY
   ├── Never shoot the messenger
   ├── "Bad news early is good news; bad news late is bad news"
   └── Punish hiding problems, not having problems
```

  if (ch.section !== currentSection) {
    currentSection = ch.section;

// Render all chapters from embedded markdown
function renderContent() {
  const contentEl = document.getElementById('content');
  let allHtml = '';

  // Marked config
  marked.setOptions({
    breaks: true,
    gfm: true,
  });

  for (let i = 0; i < chapters.length; i++) {
    const scriptEl = document.getElementById('ch-' + i);
    if (scriptEl) {
      const md = scriptEl.textContent;
      const html = marked.parse(md);
      allHtml += '<div id="chapter-' + i + '" class="chapter-section" data-index="' + i + '">' + html + '</div>';
    } else {
      allHtml += '<div id="chapter-' + i + '" class="chapter-section" data-index="' + i + '"><h1>Chuong ' + chapters[i].num + ': ' + chapters[i].title + '</h1><p style="color:var(--red)">Khong tim thay noi dung chapter.</p></div>';
    }
  }

  contentEl.innerHTML = allHtml;

  // Post-process: enhance rendered HTML
  enhanceContent();
  setupScrollSpy();
}

// Enhance content after render
function enhanceContent() {
  // 1. Blockquote callout types
  document.querySelectorAll('#content blockquote').forEach(bq => {
    const text = bq.textContent.toLowerCase();
    if (text.includes('warning') || text.includes('caution') || text.includes('luu y')) {
      bq.classList.add('callout-warn');
      bq.style.borderLeftColor = 'var(--yellow)';
      bq.style.background = 'var(--warn-bg)';
    } else if (text.includes('important') || text.includes('quan trong') || text.includes('danger')) {
      bq.classList.add('callout-danger');
      bq.style.borderLeftColor = 'var(--red)';
      bq.style.background = 'var(--danger-bg)';
    } else if (text.includes('tip') || text.includes('hint') || text.includes('cach dung')) {
      bq.classList.add('callout-tip');
      bq.style.borderLeftColor = 'var(--green)';
      bq.style.background = 'var(--tip-bg)';
    }
  });

  // 2. Wrap tables in Excel-like container
  document.querySelectorAll('#content table').forEach(table => {
    if (table.parentElement.classList.contains('table-wrap')) return;
    const wrap = document.createElement('div');
    wrap.className = 'table-wrap';
    table.parentNode.insertBefore(wrap, table);
    wrap.appendChild(table);
  });

  // 3. Classify code blocks by content
  document.querySelectorAll('#content pre').forEach(pre => {
    const text = pre.textContent;
    const lines = text.split('\n');

    // Dashboard / Report style (has box-drawing chars or table-like structure)
    const hasDashboard = (text.includes('═══') || text.includes('───') || text.includes('┌') || text.includes('├'));
    const hasTableChars = (text.includes('│') && text.includes('┼'));
    const isReport = /DAILY|WEEKLY|MONTHLY|REPORT|PERFORMANCE|OVERVIEW|SCORECARD|P&L|RECONCIL/i.test(text);
    const isFlow = (text.includes('↓') || text.includes('→')) && text.includes('├') && !hasTableChars;

    if (isReport || hasTableChars || (hasDashboard && lines.length > 8)) {
      pre.classList.add('pre-dashboard');
      // Try to detect label from first meaningful line
      const firstLine = lines.find(l => l.trim().length > 3 && !l.match(/^[═─┌┐└┘│├┤┬┴┼\s]+$/));
      if (firstLine) {
        const label = firstLine.trim().replace(/^[#*\s]+/, '').substring(0, 60);
        if (label && label.length > 5) {
          pre.setAttribute('data-label', label);
        }
      }
    } else if (isFlow) {
      pre.classList.add('pre-flow');
    }
  });
}

// Scroll spy + progress
function setupScrollSpy() {
  const mainEl = document.getElementById('main');
  const sections = document.querySelectorAll('.chapter-section');
  const navItems = document.querySelectorAll('.nav-item');
  const progressFill = document.getElementById('progress-fill');
  const sidebarProgress = document.getElementById('sidebar-progress');
  const progressText = document.getElementById('progress-text');
  const backToTop = document.getElementById('back-to-top');

  mainEl.addEventListener('scroll', () => {
    const scrollTop = mainEl.scrollTop;
    const scrollHeight = mainEl.scrollHeight - mainEl.clientHeight;
    const pct = Math.round(scrollTop / scrollHeight * 100);
    progressFill.style.width = pct + '%';
    sidebarProgress.style.width = pct + '%';
    progressText.textContent = pct + '% da doc';

    // Back to top button
    backToTop.style.display = scrollTop > 400 ? 'flex' : 'none';

    // Active chapter
    let current = 0;
    sections.forEach((section, i) => {
      if (section.offsetTop - 120 <= scrollTop) {
        current = i;
      }
    });

    navItems.forEach(item => item.classList.remove('active'));
    if (navItems[current]) {
      navItems[current].classList.add('active');
      navItems[current].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  });
}

// Search — filter nav items and hide section headers when no matches
function filterNav(query) {
  const q = query.toLowerCase();
  const navChildren = navEl.children;
  let lastHeader = null;
  let headerHasVisibleItems = false;

  for (let c = 0; c < navChildren.length; c++) {
    const el = navChildren[c];
    if (el.classList.contains('nav-item')) {
      const idx = parseInt(el.dataset.index);
      const ch = chapters[idx];
      const match = !q || ch.title.toLowerCase().includes(q) || ch.num.includes(q) || ch.days.toLowerCase().includes(q);
      el.style.display = match ? '' : 'none';
      if (match) headerHasVisibleItems = true;
    } else {
      // Section header
      if (lastHeader !== null) {
        lastHeader.style.display = headerHasVisibleItems ? '' : 'none';
      }
      lastHeader = el;
      headerHasVisibleItems = false;
    }
  }
  // Handle last header
  if (lastHeader !== null) {
    lastHeader.style.display = headerHasVisibleItems ? '' : 'none';
  }
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('search-input').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('search-input').blur();
    document.getElementById('search-input').value = '';
    filterNav('');
    document.getElementById('sidebar').classList.remove('open');
  }
});

renderContent();
</script>
